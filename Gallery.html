<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Hub</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #222;
            color: white;
            text-align: center;
        }
        .video-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        video {
            width: 95%;
            height: 95%;
            object-fit: cover;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            padding: 20px;
        }
        .gallery-item {
            background: #333;
            padding: 15px;
            border-radius: 10px;
        }
        .gallery-item img {
            width: 100%;
            border-radius: 10px;
        }
        .caption {
            margin-top: 10px;
            font-size: 1.2em;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="video-container">
        <video autoplay loop muted playsinline>

        </video>
    </div>

            <img src="2.png" alt="Red Sports Car in Autumn">

</body>
</html>
